[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Solidity compiler version
solc_version = "0.8.20"

# Optimization settings
optimizer = true
optimizer_runs = 200
via_ir = true

# EVM version
evm_version = "paris"

# Gas reporting
gas_reports = ["HEC1155Registry", "HECRetirementReceipt"]

# Test configuration
fuzz_runs = 256
fuzz_max_test_rejects = 65536

[profile.ci]
fuzz_runs = 10000
